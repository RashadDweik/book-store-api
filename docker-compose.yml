services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/app/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      RATE_LIMIT_STORAGE_URI: redis://redis-rate-limiter:6379
      REFRESH_TOKEN_REDIS_URL: redis://:${REDIS_REFRESH_PASSWORD:-dev-refresh-pass}@redis-refresh:6379/0
    depends_on:
      - db
      - redis
      - redis-rate-limiter
      - redis-refresh
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5
  db:
    image: postgres:16-alpine
    container_name: bookshop-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bookshop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookshop}
      POSTGRES_DB: ${POSTGRES_DB:-bookshop}
    ports:
      - "5432:5432"
    volumes:
      - bookshop_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis-rate-limiter:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis-refresh:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec", "--requirepass", "${REDIS_REFRESH_PASSWORD:-dev-refresh-pass}"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:6381:6379"
    volumes:
      - redis_refresh_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_REFRESH_PASSWORD:-dev-refresh-pass}\" ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  bookshop_db:
  redis_refresh_data:
