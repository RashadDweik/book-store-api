services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./app:/app/app
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis-inventory:6379
      RATE_LIMIT_STORAGE_URI: redis://redis-rate-limiter:6379
      REFRESH_TOKEN_REDIS_URL: redis://:${REDIS_REFRESH_PASSWORD:-dev-refresh-pass}@redis-refresh:6379/0
      REFRESH_COOKIE_SECURE: "true"
      REFRESH_COOKIE_SAMESITE: strict
      ALLOWED_ORIGINS: '["https://${DOMAIN}"]'
    depends_on:
      - db
      - redis-inventory
      - redis-rate-limiter
      - redis-refresh
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5
  db:
    image: postgres:16-alpine
    container_name: bookshop-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bookshop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookshop}
      POSTGRES_DB: ${POSTGRES_DB:-bookshop}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - bookshop_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-inventory:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis-rate-limiter:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis-refresh:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec", "--requirepass", "${REDIS_REFRESH_PASSWORD:-dev-refresh-pass}"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:6381:6379"
    volumes:
      - redis_refresh_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_REFRESH_PASSWORD:-dev-refresh-pass}\" ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles:
      - prod
    depends_on:
      - api
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  bookshop_db:
  redis_refresh_data:
  caddy_data:
  caddy_config:
